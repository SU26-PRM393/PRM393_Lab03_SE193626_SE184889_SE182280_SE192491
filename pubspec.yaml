name: vietnam_map_flutter
description: Desktop Viet Nam map UI built with Flutter and Material 3.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  flutter_map: ^8.3.0
  vector_map_tiles: ^9.0.0-beta.8
  flutter_test:
    sdk: flutter
  geolocator: ^14.0.2
  latlong2: ^0.9.1

dev_dependencies:
  build_runner: ^2.4.8
  isar_generator: ^3.1.0+1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/features/vietnam_map/assets/data/
    - lib/features/vietnam_map/assets/boundaries/
    - lib/features/vietnam_map/assets/offline_tiles/
    - assets/images/
