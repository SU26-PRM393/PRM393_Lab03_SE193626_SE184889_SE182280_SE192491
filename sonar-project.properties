# SonarQube Project Configuration
# Vietnam Map Flutter Project

# Project identification
sonar.projectKey=vietnam-map-flutter
sonar.projectName=Vietnam Map Flutter
sonar.projectVersion=0.1.0
sonar.projectDescription=Desktop Vietnam map UI built with Flutter and Material 3

# Source code location
sonar.sources=lib
sonar.tests=test

# File exclusions (generated files, third-party, build artifacts)
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/generated/**,build/**,.dart_tool/**
sonar.test.exclusions=**/*.g.dart

# Language specification
sonar.language=dart

# Code coverage (if LCOV report is generated)
sonar.coverageReportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Host URL - Configure based on your SonarQube instance
sonar.host.url=http://localhost:9000

# Authentication token (set via environment variable or command line)
# sonar.login=${SONAR_TOKEN}

